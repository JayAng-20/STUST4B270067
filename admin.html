<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>訂單後台 | ROK Tech Admin</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section class="admin-login" data-admin-gate>
        <a class="brand" href="index.html">
          <span class="brand-mark">ROK</span>
          <span>ROK Admin<small>Order Management</small></span>
        </a>
        <div>
          <p class="eyebrow">Back Office</p>
          <h1>訂單後台登入</h1>
          <p>這個頁面與前台分開，公開網站導覽列不會出現後台入口。</p>
        </div>
        <form data-admin-login>
          <label>後台密碼
            <input name="password" type="password" autocomplete="current-password" placeholder="輸入展示密碼" required>
          </label>
          <p class="form-hint">展示密碼：rok1976</p>
          <p class="form-error" data-admin-message></p>
          <button class="btn primary wide" type="submit">登入後台</button>
        </form>
      </section>

      <section class="admin-dashboard" data-admin-dashboard hidden>
        <header class="admin-topbar">
          <a class="brand" href="index.html">
            <span class="brand-mark">ROK</span>
            <span>ROK Admin<small>Order Management</small></span>
          </a>
          <div class="admin-actions">
            <span class="sync-time" data-sync-time>尚未同步</span>
            <button class="btn accent" type="button" data-refresh-orders>
              <svg class="refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                <polyline points="21 3 21 9 15 9"></polyline>
              </svg>
              重新整理訂單
            </button>
            <a class="btn ghost" href="index.html">回前台</a>
            <button class="btn danger" type="button" data-clear-orders>清除所有訂單</button>
            <button class="btn primary" type="button" data-admin-logout>登出</button>
          </div>
        </header>

        <section class="admin-hero">
          <div>
            <p class="eyebrow">Dashboard</p>
            <h1>訂單管理</h1>
            <p>查看訂單、搜尋客戶、篩選狀態，並更新出貨處理進度。</p>
          </div>
        </section>

        <section class="order-stats" data-order-stats></section>

        <section class="admin-controls">
          <label>搜尋訂單
            <input data-order-search type="search" placeholder="訂單編號、姓名、Email、商品">
          </label>
          <label>狀態篩選
            <select data-order-status-filter>
              <option>全部</option>
              <option>新訂單</option>
              <option>處理中</option>
              <option>已出貨</option>
              <option>已完成</option>
              <option>已取消</option>
            </select>
          </label>
        </section>

        <section class="admin-order-layout">
          <div class="admin-order-list" data-admin-orders></div>
          <div data-order-detail></div>
        </section>
      </section>
    </main>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
